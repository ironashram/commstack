name: Deploy Mail Server

on:
  push:
    branches:
      - master
    paths:
      - 'ansible/files/mailserver/**'
      - 'ansible/tasks/mailserver.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/ansible-base.yaml
    with:
      tags: mailserver
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
