name: Deploy Matrix

on:
  push:
    branches:
      - master
    paths:
      - 'ansible/files/matrix/**'
      - 'ansible/tasks/matrix.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/ansible-base.yaml
    with:
      tags: matrix
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
