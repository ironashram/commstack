name: Deploy Monitoring

on:
  push:
    branches:
      - master
    paths:
      - 'ansible/files/monitoring/**'
      - 'ansible/tasks/monitoring.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/ansible-base.yaml
    with:
      tags: monitoring
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
