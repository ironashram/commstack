ansible_python_interpreter: auto_silent

# connection
ssh_config_dir: /tmp/commstack-ssh
ansible_ssh_private_key_file: "{{ ssh_config_dir }}/id_rsa"
ansible_ssh_common_args: "-o UserKnownHostsFile={{ ssh_config_dir }}/known_hosts -o StrictHostKeyChecking=yes"

# backup
backup_stage: /tmp/commstack-backup-stage
backup_keep: 14
