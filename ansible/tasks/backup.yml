---
- name: backup | Set tags fact
  ansible.builtin.set_fact:
    ansible_tags: "{{ ansible_tags | default([]) + ['backup'] }}"

- name: backup | Timestamp
  ansible.builtin.set_fact:
    backup_ts: "{{ ansible_date_time.iso8601_basic_short }}"
  run_once: true

- name: backup | Resolve connection vars
  ansible.builtin.set_fact:
    ansible_port: "{{ ansible_port | int }}"
    ansible_host: "{{ ansible_ssh_host }}"

- name: backup | Stage dir on controller
  ansible.builtin.file:
    path: "{{ backup_stage }}/{{ backup_ts }}"
    state: directory
    mode: "0700"
  delegate_to: localhost

- name: backup | Pull data from {{ backup_name }}
  ansible.posix.synchronize:
    mode: pull
    src: "{{ item }}"
    dest: "{{ backup_stage }}/{{ backup_ts }}/"
    rsync_opts:
      - --numeric-ids
      - --relative
      - -HAX
    delete: false
    compress: false
    delay_updates: false
  loop: "{{ backup_paths }}"

- name: backup | Ensure NFS dest exists
  ansible.builtin.file:
    path: "{{ backup_nfs_dest }}"
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: backup | Archive stage into NFS dest
  community.general.archive:
    path: "{{ backup_stage }}/{{ backup_ts }}/"
    dest: "{{ backup_nfs_dest }}/{{ backup_name }}-{{ backup_ts }}.tar.gz"
    format: gz
    mode: "0600"
    remove: true
  delegate_to: localhost

- name: backup | Compute archive hash
  ansible.builtin.stat:
    path: "{{ backup_nfs_dest }}/{{ backup_name }}-{{ backup_ts }}.tar.gz"
    checksum_algorithm: sha256
    get_checksum: true
  register: backup_archive_stat
  delegate_to: localhost

- name: backup | Save archive hash
  ansible.builtin.copy:
    content: "{{ backup_archive_stat.stat.checksum }}  {{ backup_name }}-{{ backup_ts }}.tar.gz\n"
    dest: "{{ backup_nfs_dest }}/{{ backup_name }}-{{ backup_ts }}.tar.gz.sha256"
    mode: "0600"
  delegate_to: localhost

- name: backup | List existing tarballs
  ansible.builtin.find:
    paths: "{{ backup_nfs_dest }}"
    patterns: "{{ backup_name }}-*.tar.gz"
    file_type: file
  register: backup_tarballs
  delegate_to: localhost

- name: backup | Apply retention to tarballs (keep newest {{ backup_keep }})
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ (backup_tarballs.files | sort(attribute='mtime', reverse=true))[backup_keep | int :] }}"
  loop_control:
    label: "{{ item.path | basename }}"
  delegate_to: localhost

- name: backup | Apply retention to hashes
  ansible.builtin.file:
    path: "{{ item.path }}.sha256"
    state: absent
  loop: "{{ (backup_tarballs.files | sort(attribute='mtime', reverse=true))[backup_keep | int :] }}"
  loop_control:
    label: "{{ (item.path | basename) }}.sha256"
  delegate_to: localhost
