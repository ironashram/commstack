---
- name: backup-scheduler | Install commstack backup cron
  ansible.builtin.cron:
    name: commstack-backup
    user: "{{ lookup('env', 'USER') }}"
    minute: "0"
    hour: "3"
    job: "zsh -c 'source ~/.zshrc; cd ~/Documents/github/commstack/ansible && ansible-playbook -i inventory.yml backup.yml --tags backup'"
    cron_file: commstack-backup
    state: present
  become: true
