---
- name: backup-scheduler | Install commstack backup cron
  ansible.builtin.cron:
    name: commstack-backup
    user: "{{ lookup('env', 'USER') }}"
    minute: "0"
    hour: "3"
    job: "XDG_RUNTIME_DIR=/run/user/$(id -u) zellij -s commstack-backup action new-pane --close-on-exit --cwd $HOME/Documents/github/commstack/ansible -- ansible-playbook -i inventory.yml backup.yml --tags backup"
    cron_file: commstack-backup
    state: present
  become: true
