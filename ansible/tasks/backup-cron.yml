---
- name: backup-cron | Install backup crons
  ansible.builtin.cron:
    name: "{{ item.name }}-backup"
    user: "{{ lookup('env', 'USER') }}"
    minute: "0"
    hour: "{{ item.hour }}"
    job: >-
      XDG_RUNTIME_DIR=/run/user/$(id -u)
      zellij -s {{ item.name }}-backup action new-pane --close-on-exit
      --cwd $HOME/Documents/github/commstack/ansible
      -- ansible-playbook -i inventory.yml backup.yml --tags backup --limit {{ item.name }}
    cron_file: "{{ item.name }}-backup"
    state: present
  loop:
    - { name: commstack, hour: "3" }
    - { name: coolify, hour: "4" }
  become: true
