---
- name: Dynamic Inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure ssh config dir exists
      ansible.builtin.file:
        path: "{{ ssh_config_dir }}"
        state: directory
        mode: "0700"
      tags: always

    - name: Write SSH known_hosts from Vault
      ansible.builtin.copy:
        content: "{{ lookup('hashi_vault', 'secret=kv/data/ansible:known_hosts') }}"
        dest: "{{ ssh_config_dir }}/known_hosts"
        mode: "0644"
      tags: always

    - name: Write SSH private key from Vault
      ansible.builtin.copy:
        content: "{{ lookup('hashi_vault', 'secret=kv/data/ansible:private_key') }}"
        dest: "{{ ssh_config_dir }}/id_rsa"
        mode: "0600"
      no_log: true
      tags: always

    - name: Add commstack
      ansible.builtin.add_host:
        name: commstack
      tags:
        - packages
        - iptables
        - certbot
        - matrix
        - mailserver
        - monitoring
      changed_when: false

    - name: Add coolify
      ansible.builtin.add_host:
        name: coolify
      tags:
        - coolify
      changed_when: false

- name: Configure commstack
  hosts: commstack
  gather_facts: true
  tasks:
    - name: Install Packages
      ansible.builtin.import_tasks: tasks/pkg.yml
      tags: packages

    - name: Configure Iptables
      ansible.builtin.import_tasks: tasks/iptables.yml
      tags: iptables

    - name: Configure Certbot
      ansible.builtin.import_tasks: tasks/certbot.yml
      tags: certbot

    - name: Configure Matrix
      ansible.builtin.import_tasks: tasks/matrix.yml
      tags: matrix

    - name: Configure Mail Server
      ansible.builtin.import_tasks: tasks/mailserver.yml
      tags: mailserver

    - name: Configure Monitoring
      ansible.builtin.import_tasks: tasks/monitoring.yml
      tags: monitoring

  handlers:
    - name: Flush iptables
      ansible.builtin.iptables:
        flush: true

    - name: Apply ipv4 iptables rules
      community.general.iptables_state:
        state: restored
        path: /etc/iptables/iptables.rules
      async: "{{ ansible_timeout }}"
      poll: 0

    - name: Apply ipv6 iptables rules
      community.general.iptables_state:
        state: restored
        path: /etc/iptables/ip6tables.rules
        ip_version: ipv6
      async: "{{ ansible_timeout }}"
      poll: 0

    - name: Restart Docker
      ansible.builtin.systemd_service:
        name: docker.service
        state: restarted

    - name: Docker Compose Up - Certbot
      community.docker.docker_compose_v2:
        project_src: /docker/certbot
        state: present
        recreate: auto
        remove_orphans: true
      when: "'certbot' in ansible_tags"
      listen: "Docker Compose Up"

    - name: Docker Compose Up - Monitoring
      community.docker.docker_compose_v2:
        project_src: /docker/monitoring
        state: present
        recreate: auto
        remove_orphans: true
      when: "'monitoring' in ansible_tags"
      listen: "Docker Compose Up"

    - name: Docker Compose Up - Matrix
      community.docker.docker_compose_v2:
        project_src: /docker/matrix
        state: present
        recreate: auto
        remove_orphans: true
      when: "'matrix' in ansible_tags"
      listen: "Docker Compose Up"

    - name: Docker Compose Up - Mail
      community.docker.docker_compose_v2:
        project_src: /docker/mail
        state: present
        recreate: auto
        remove_orphans: true
      when: "'mailserver' in ansible_tags"
      listen: "Docker Compose Up"

- name: Configure coolify
  hosts: coolify
  gather_facts: true
  tasks:
    - name: Install Packages
      ansible.builtin.import_tasks: tasks/pkg.yml
      tags: coolify

    - name: Configure Iptables
      ansible.builtin.import_tasks: tasks/iptables.yml
      tags: coolify

    - name: Configure Coolify
      ansible.builtin.import_tasks: tasks/coolify.yml
      tags: coolify

  handlers:
    - name: Flush iptables
      ansible.builtin.iptables:
        flush: true

    - name: Apply ipv4 iptables rules
      community.general.iptables_state:
        state: restored
        path: /etc/iptables/iptables.rules
      async: "{{ ansible_timeout }}"
      poll: 0

    - name: Apply ipv6 iptables rules
      community.general.iptables_state:
        state: restored
        path: /etc/iptables/ip6tables.rules
        ip_version: ipv6
      async: "{{ ansible_timeout }}"
      poll: 0

    - name: Restart Docker
      ansible.builtin.systemd_service:
        name: docker.service
        state: restarted

    - name: Docker Compose Up - Coolify
      community.docker.docker_compose_v2:
        project_src: /data/coolify/source
        files:
          - docker-compose.yml
          - docker-compose.prod.yml
        env_files:
          - /data/coolify/source/.env
        state: present
        recreate: auto
        remove_orphans: true
      when: "'coolify' in ansible_tags"
      listen: "Docker Compose Up"
